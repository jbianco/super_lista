# =============================================================================
# SuperLista — Production Deployment (GitOps-ready)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# GitOps flow:
#   1. Push to main → GitHub Actions builds & pushes images to ghcr.io
#   2. GitHub Actions SSHes into the VPS, pulls new images, and restarts
#   3. No manual steps on the server
# =============================================================================

services:
  # ── Gateway (Caddy) ─────────────────────────────────────────────
  # Single entry point: TLS termination, rate limiting, security headers.
  # All external traffic goes through here — backend and frontend are
  # not directly exposed.
  gateway:
    image: caddy:2-alpine
    ports:
      - "80:80"    # HTTP (auto-redirects to HTTPS)
      - "443:443"  # HTTPS with auto TLS via Let's Encrypt
    volumes:
      - ./infrastructure/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env.prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - superlista
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend (FastAPI) ───────────────────────────────────────────
  # Pre-built image: ghcr.io/jbianco/super_lista/backend
  # Build locally:  docker compose -f docker-compose.prod.yml build backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: ghcr.io/jbianco/super_lista/backend:latest
    # No exposed ports — only reachable through gateway
    environment:
      - DATABASE_URL=sqlite:///data/superlista.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - USE_REAL_CART=${USE_REAL_CART:-false}
      - CORS_ORIGINS=https://${DOMAIN:-your-domain.com}
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - superlista
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend (Nginx SPA) ────────────────────────────────────────
  # Pre-built image: ghcr.io/jbianco/super_lista/frontend
  # Build locally:  docker compose -f docker-compose.prod.yml build frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: ghcr.io/jbianco/super_lista/frontend:latest
    # No exposed ports — served through gateway
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - superlista
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Watchtower (auto-update) ────────────────────────────────────
  # Optional: automatically pulls new images and restarts containers.
  # Enable by uncommenting below.
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   environment:
  #     - WATCHTOWER_CLEANUP=true
  #     - WATCHTOWER_POLL_INTERVAL=300
  #   restart: unless-stopped
  #   networks:
  #     - superlista

volumes:
  backend_data:
  caddy_data:
  caddy_config:

networks:
  superlista:
    driver: bridge
