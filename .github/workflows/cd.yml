# =============================================================================
# CD — GitOps Deploy
# =============================================================================
# Automatically builds, pushes, and deploys SuperLista on every push to main.
#
# Required repository secrets:
#   VPS_HOST      — IP or domain of the production server
#   VPS_USER      — SSH username (e.g. "ubuntu", "opc", "root")
#   VPS_SSH_KEY   — SSH private key for authentication
#   GHCR_TOKEN    — GitHub PAT with `read:packages` + `write:packages` scopes
# =============================================================================

name: CD

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_ACTOR,GHCR_TOKEN,VPS_HOST
        script: |
          set -e

          echo ">>> Logging into ghcr.io..."
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

          echo ">>> Pulling latest code..."
          cd /opt/superlista
          git pull origin main

          echo ">>> Pulling new images..."
          docker compose -f docker-compose.prod.yml pull

          echo ">>> Restarting services..."
          docker compose -f docker-compose.prod.yml up -d

          echo ">>> Cleaning up old images..."
          docker image prune -af

          echo ">>> Verifying services..."
          docker compose -f docker-compose.prod.yml ps

          echo ">>> Deployment complete!"
